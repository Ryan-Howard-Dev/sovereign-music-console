WebSite: https://ssrd.app

AutoName: Sandbox Music
Name: Sandbox Music
Summary: Self-hosted music locker and discovery console
Description: |-
  Sandbox Music is an offline-first music locker, catalog explorer,
  and DJ console shell. Import local audio, browse charts, manage playlists,
  and optionally connect a Tier 3/4 backend for extended search and playback.

  Core locker playback works with local files. Catalog metadata and artist images
  use network services (iTunes Search API, MusicBrainz, Cover Art Archive,
  TheAudioDB). Many ecosystem features (Feed, acquire, Connect, full-stream
  playback, DLNA) require a self-hosted Tier 3/4 backend you operate. That
  backend uses yt-dlp against YouTube and similar platforms for acquire, podcast,
  and extended search paths. Air-Gap Mode blocks outbound client requests when
  enabled in Settings.

  Android builds include Google Cast (Play services) for LAN casting to TVs and
  receivers. Cast and catalog features require network access; locker playback
  does not.

  Application ID: rd.sheepskin.sandboxmusic

AntiFeatures:
  - Network
  - NonFreeNet
  - NonFreeDep
  - TetheredNet

