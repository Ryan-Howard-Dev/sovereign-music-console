name: Nightly E2E

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  android-smoke:
    name: Android smoke E2E (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Smoke E2E on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: |
            npm run build:android:apk
            chmod +x scripts/android-smoke-e2e.sh
            SKIP_BUILD=1 scripts/android-smoke-e2e.sh
